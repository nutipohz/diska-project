name: "Godot Android Build"
on: [push, pull_request]

jobs:
  export-android:
    name: Android Export
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Unzip Project Source
        run: |
          if [ -f project.zip ]; then
            unzip project.zip -d .
            rm project.zip
          fi

      - name: Setup Godot Engine 4
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.3.0
          include-templates: true

      - name: Native Godot Export
        run: |
          mkdir -p build
          godot --headless --export-release "Android" build/game.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-game-apk
          path: build/game.apk


