name: "Godot Android Build"
on: [push, pull_request]

jobs:
  export-android:
    name: Android Export
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Unzip Project Source
        run: |
          if [ -f project.zip ]; then
            unzip project.zip -d .
            rm project.zip
          fi

      - name: Automatic Godot Setup
        uses: ammar-ahm-ed/godot-setup@v1
        with:
          version: '4.4-st'

      - name: Download Manual Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.4.stable
          echo "Preparing compilation workspace"

      - name: Native Godot Export
        run: |
          mkdir -p build
          godot --headless --export-release "Android" build/game.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-game-apk
          path: build/game.apk

