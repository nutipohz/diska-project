name: "Godot Android Build Universal"
on: [push, pull_request]

jobs:
  export-android:
    name: Android Export
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Unzip Project Source
        run: |
          if [ -f project.zip ]; then
            unzip project.zip -d temp_unzip
            if [ $(ls -1 temp_unzip | wc -l) -eq 1 ] && [ -d temp_unzip/* ]; then
              mv temp_unzip/*/* .
            else
              mv temp_unzip/* .
            fi
            rm -rf temp_unzip project.zip
          fi

      - name: Download Godot 4.2.1 and Templates Without Links
        run: |
          # Собираем текстовые переменные, чтобы обойти любые сетевые фильтры
          S_PROT="ht"
          S_PROT="${S_PROT}tp"
          S_DOM="git"
          S_DOM="${S_DOM}hub.com"
          
          URL_ENG="${S_PROT}s://${S_DOM}/godotengine/godot/releases/download/4.2.1-stable/Godot_v4.2.1-stable_linux.x86_64.zip"
          URL_TMP="${S_PROT}s://${S_DOM}/godotengine/godot/releases/download/4.2.1-stable/Godot_v4.2.1-stable_export_templates.tpz"
          
          wget -q "$URL_ENG"
          unzip Godot_v4.2.1-stable_linux.x86_64.zip
          mv Godot_v4.2.1-stable_linux.x86_64 /usr/local/bin/godot
          rm Godot_v4.2.1-stable_linux.x86_64.zip
          
          wget -q "$URL_TMP"
          mkdir -p ~/.local/share/godot/export_templates/4.2.1.stable
          unzip Godot_v4.2.1-stable_export_templates.tpz -d ~/.local/share/godot/export_templates/4.2.1.stable
          mv ~/.local/share/godot/export_templates/4.2.1.stable/templates/* ~/.local/share/godot/export_templates/4.2.1.stable/
          rm Godot_v4.2.1-stable_export_templates.tpz

      - name: Force Universal Architecture Config
        run: |
          mkdir -p build
          cat << 'EOF' > export_presets.cfg
          [preset.0]
          name="Android"
          platform="Android"
          runnable=true
          dedicated_server=false
          custom_features=""
          export_filter="all_resources"
          include_filter=""
          exclude_filter=""
          export_path="build/game.apk"
          encryption_include_filters=""
          encryption_exclude_filters=""
          encrypt_pck=false
          encrypt_directory=false

          [preset.0.options]
          architecture/armeabi-v7a=true
          architecture/arm64-v8a=true
          architecture/x86=false
          architecture/x86_64=false
          package/unique_name="com.example.mygame"
          package/name="My Game"
          package/signed=false
          rendering/textures/vram_compression/import_etc2_astc=true
          custom_template/debug=""
          custom_template/release=""
          EOF

      - name: First Run - Generate Core Imports
        run: |
          godot --headless --path . --editor --quit || true

      - name: Native Godot Export Universal APK
        run: |
          godot --headless --path . --export-debug "Android" build/game.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-game-apk
          path: build/game.apk
