name: "Godot Android Debug Build"
on: [push, pull_request]

jobs:
  export-android:
    name: Android Export
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Unzip and Flatten Project Source
        run: |
          if [ -f project.zip ]; then
            unzip project.zip -d temp_unzip
            if [ $(ls -1 temp_unzip | wc -l) -eq 1 ] && [ -d temp_unzip/* ]; then
              mv temp_unzip/*/* .
            else
              mv temp_unzip/* .
            fi
            rm -rf temp_unzip project.zip
          fi

      - name: Setup Standard Godot Engine 4.7.1
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.1
          use-mono: false
          include-templates: true

      - name: Force Debug Architecture Config
        run: |
          mkdir -p build
          cat << 'EOF' > export_presets.cfg
          [preset.0]
          name="Android"
          platform="Android"
          runnable=true
          dedicated_server=false
          custom_features=""
          export_filter="all_resources"
          include_filter=""
          exclude_filter=""
          export_path="build/game.apk"
          encryption_include_filters=""
          encryption_exclude_filters=""
          encrypt_pck=false
          encrypt_directory=false

          [preset.0.options]
          architecture/armeabi-v7a=true
          architecture/arm64-v8a=true
          architecture/x86=false
          architecture/x86_64=false
          package/unique_name="com.example.mygame"
          package/name="My Game"
          package/signed=false
          rendering/textures/vram_compression/import_etc2_astc=true
          EOF

      - name: Native Godot Debug Export
        run: |
          godot --headless --path . --export-debug "Android" build/game.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-game-apk
          path: build/game.apk






