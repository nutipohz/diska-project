name: "Godot Android Build"
on: [push, pull_request]

jobs:
  export-android:
    name: Android Export
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Unzip and Flatten Project Source
        run: |
          if [ -f project.zip ]; then
            unzip project.zip -d temp_unzip
            # Если файлы распаковались в подпапку, вытаскиваем их в корень
            if [ $(ls -1 temp_unzip | wc -l) -eq 1 ] && [ -d temp_unzip/* ]; then
              mv temp_unzip/*/* .
            else
              mv temp_unzip/* .
            fi
            rm -rf temp_unzip project.zip
          fi

      - name: Setup Godot Engine 4.7.1
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.1
          include-templates: true

      - name: Native Godot Export
        run: |
          mkdir -p build
          godot --headless --path . --export-release "Android" build/game.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-game-apk
          path: build/game.apk




