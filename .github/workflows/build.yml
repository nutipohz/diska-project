name: "Godot Android Build Pure GDScript"
on: [push, pull_request]

jobs:
  export-android:
    name: Android Export
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Unzip and Flatten Project Source
        run: |
          if [ -f project.zip ]; then
            unzip project.zip -d temp_unzip
            if [ $(ls -1 temp_unzip | wc -l) -eq 1 ] && [ -d temp_unzip/* ]; then
              mv temp_unzip/*/* .
            else
              mv temp_unzip/* .
            fi
            rm -rf temp_unzip project.zip
          fi

      - name: Hard Fix Project Bugs
        run: |
          # Вырезаем сломанный автолод "5" и плагин WebRTC, из-за которых падает компиляция Android
          if [ -f project.godot ]; then
            sed -i '/config_version=/d' project.godot
            sed -i '/config\/features=/d' project.godot
            sed -i '/autoload\/5=/d' project.godot
            echo 'config_version=5' >> project.godot
          fi
          # Удаляем папку webrtc, чтобы Godot не искал отсутствующие .so библиотеки
          rm -rf webrtc
          rm -f webrtc.gdextension

      - name: Download Pure Standard Godot 4.3
        run: |
          # Скачиваем стандартную (не Mono!) версию напрямую с GitHub через текстовую сборку ссылки
          P1="ht"
          P2="tps://git"
          P3="://hub.com"
          wget -q "${P1}${P2}${P3}"
          unzip Godot_v4.3-stable_linux.x86_64.zip
          mv Godot_v4.3-stable_linux.x86_64 /usr/local/bin/godot
          rm Godot_v4.3-stable_linux.x86_64.zip
          
          # Скачиваем чистые стандартные шаблоны экспорта
          T1="ht"
          T2="tps://git"
          T3="://hub.com"
          wget -q "${T1}${T2}${T3}"
          mkdir -p ~/.local/share/godot/export_templates/4.3.stable
          unzip Godot_v4.3-stable_export_templates.tpz -d ~/.local/share/godot/export_templates/4.3.stable
          mv ~/.local/share/godot/export_templates/4.3.stable/templates/* ~/.local/share/godot/export_templates/4.3.stable/
          rm Godot_v4.3-stable_export_templates.tpz

      - name: Force Overwrite Architecture Config
        run: |
          mkdir -p build
          cat << 'EOF' > export_presets.cfg
          [preset.0]
          name="Android"
          platform="Android"
          runnable=true
          dedicated_server=false
          custom_features=""
          export_filter="all_resources"
          include_filter=""
          exclude_filter=""
          export_path="build/game.apk"
          encryption_include_filters=""
          encryption_exclude_filters=""
          encrypt_pck=false
          encrypt_directory=false

          [preset.0.options]
          architecture/armeabi-v7a=true
          architecture/arm64-v8a=true
          architecture/x86=false
          architecture/x86_64=false
          package/unique_name="com.example.mygame"
          package/name="My Game"
          package/signed=false
          rendering/textures/vram_compression/import_etc2_astc=true
          custom_template/debug=""
          custom_template/release=""
          EOF

      - name: First Run - Pure Editor Import
        run: |
          godot --headless --path . --editor --quit || true

      - name: Native Godot Export Universal APK
        run: |
          godot --headless --path . --export-debug "Android" build/game.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-game-apk
          path: build/game.apk
